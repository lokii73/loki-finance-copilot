<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lokesh's Fat Loss Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
:root {
  --bg-dark: #080808;
  --bg-card: #121212;
  --bg-card-hover: #181818;
  --bg-surface: #1a1a1a;
  --text-main: #f3f4f6;
  --text-muted: #9ca3af;
  --text-dim: #6b7280;
  --accent: #F97316;
  --accent-glow: rgba(249, 115, 22, 0.15);
  --green: #22C55E;
  --red: #EF4444;
  --blue: #3B82F6;
  --yellow: #EAB308;
  --purple: #A855F7;
  --border-color: #1e1e1e;
  --border-light: #2a2a2a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }
h1, h2, h3, h4, .bebas { font-family: 'Bebas Neue', cursive; letter-spacing: 1px; font-weight: normal; }
.inter { font-family: 'Inter', sans-serif; }
.card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
.card:hover { border-color: var(--border-light); box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.4); }
.interactive-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; transition: all 0.25s ease; }
.interactive-card:hover { transform: translateY(-2px); background: #1f1f1f; border-color: #333; }
.glass-nav { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 50; }
.tab-button { flex: 0 0 auto; padding: 16px 24px; border: none; cursor: pointer; background: transparent; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; white-space: nowrap; transition: all 0.3s ease; color: var(--text-muted); border-bottom: 2px solid transparent; position: relative; }
.tab-button:hover { color: #fff; background: rgba(255, 255, 255, 0.03); }
.tab-button.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: linear-gradient(to top, var(--accent-glow), transparent); }
.accordion-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.accordion-content.open { grid-template-rows: 1fr; }
.accordion-inner { overflow: hidden; }
.fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
.hero-glow { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 50% 0%, var(--accent-glow) 0%, transparent 70%); pointer-events: none; z-index: 0; }
.pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
.glow-text { text-shadow: 0 0 20px rgba(249, 115, 22, 0.4); }
</style>

<!-- Load React and Babel -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<!-- React Component Code -->
<script type="text/babel">
const { useState, useEffect } = React;

const accent = "var(--accent)";
const green = "var(--green)";
const red = "var(--red)";
const blue = "var(--blue)";
const yellow = "var(--yellow)";
const purple = "var(--purple)";

const Section = ({ title, icon, color = accent, children, id, delay = "" }) => {
  const [open, setOpen] = useState(true);
  return (
    <div className={`card fade-in-up ${delay}`} id={id} style={{ marginBottom: 32 }}>
      <button
        onClick={() => setOpen(o => !o)}
        style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, background: `linear-gradient(90deg, var(--bg-surface), #141414)`, border: "none", padding: "20px 24px", cursor: "pointer", borderLeft: `4px solid ${color}`, textAlign: "left", transition: "background 0.3s ease" }}
        onMouseEnter={(e) => e.currentTarget.style.background = `linear-gradient(90deg, #1f1f1f, #141414)`}
        onMouseLeave={(e) => e.currentTarget.style.background = `linear-gradient(90deg, var(--bg-surface), #141414)`}
      >
        <span style={{ fontSize: 24 }}>{icon}</span>
        <span className="bebas" style={{ color: "#fff", fontSize: 22, flex: 1 }}>{title}</span>
        <span style={{ color: color, fontSize: 16, fontWeight: 700, transition: 'transform 0.3s ease', transform: open ? 'rotate(180deg)' : 'rotate(0deg)' }}>▼</span>
      </button>
      <div className={`accordion-content ${open ? 'open' : ''}`}>
        <div className="accordion-inner">
          <div style={{ padding: "24px", color: "var(--text-muted)", fontSize: "15px" }}>{children}</div>
        </div>
      </div>
    </div>
  );
};

const Macro = ({ label, value, unit, color, pct }) => {
  const [width, setWidth] = useState(0);
  useEffect(() => { setTimeout(() => setWidth(pct), 300); }, [pct]);
  return (
    <div className="interactive-card" style={{ flex: 1, minWidth: 140, padding: "20px", textAlign: "center" }}>
      <div className="bebas" style={{ color, fontSize: 32 }}>{value}<span style={{fontSize: 20}}>{unit}</span></div>
      <div style={{ color: "var(--text-dim)", fontSize: 13, marginTop: 4, fontWeight: 500 }}>{label}</div>
      <div style={{ marginTop: 12, background: "rgba(255,255,255,0.05)", borderRadius: 99, height: 6, overflow: "hidden" }}>
        <div style={{ width: `${width}%`, background: color, height: "100%", borderRadius: 99, transition: "width 1.5s cubic-bezier(0.16, 1, 0.3, 1)" }} />
      </div>
      <div style={{ color: "var(--text-dim)", fontSize: 11, marginTop: 6, fontWeight: 600 }}>{pct}% OF CALORIES</div>
    </div>
  );
};

const MealCard = ({ time, name, icon, foods, calories, protein, note, color = accent }) => (
  <div className="interactive-card" style={{ padding: "20px", marginBottom: 16, borderLeft: `3px solid ${color}` }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
      <div>
        <div style={{ color: "var(--text-dim)", fontSize: 11, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600 }}>{time}</div>
        <div className="bebas" style={{ color: "#fff", fontSize: 22, marginTop: 4 }}>{icon} {name}</div>
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <span style={{ background: "rgba(249, 115, 22, 0.1)", color: accent, borderRadius: 8, padding: "6px 12px", fontSize: 13, fontWeight: 700, border: `1px solid rgba(249, 115, 22, 0.2)` }}>~{calories} kcal</span>
        <span style={{ background: "rgba(34, 197, 94, 0.1)", color: green, borderRadius: 8, padding: "6px 12px", fontSize: 13, fontWeight: 700, border: `1px solid rgba(34, 197, 94, 0.2)` }}>~{protein}g pro</span>
      </div>
    </div>
    <ul style={{ margin: "16px 0 0 0", paddingLeft: 20 }}>
      {foods.map((f, i) => <li key={i} style={{ color: "#d1d5db", fontSize: 14.5, marginBottom: 8 }}>{f}</li>)}
    </ul>
    {note && (
      <div style={{ marginTop: 16, background: "rgba(234, 179, 8, 0.05)", borderRadius: 8, padding: "12px 16px", color: "#bbb", fontSize: 13.5, borderLeft: `2px solid ${yellow}` }}>
        <span style={{marginRight: 6}}>💡</span>{note}
      </div>
    )}
  </div>
);

const Chip = ({ text, color }) => (
  <span style={{ display: "inline-block", background: `rgba(255,255,255,0.05)`, color, borderRadius: 99, padding: "6px 14px", fontSize: 12, fontWeight: 600, margin: "4px 6px 4px 0", border: `1px solid rgba(255,255,255,0.1)` }}>{text}</span>
);

const WorkoutDay = ({ day, type, exercises, color }) => (
  <div className="interactive-card" style={{ padding: "20px", marginBottom: 16, borderTop: `3px solid ${color}` }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
      <span className="bebas" style={{ color: "#fff", fontSize: 22 }}>{day}</span>
      <Chip text={type} color={color} />
    </div>
    <ul style={{ margin: 0, paddingLeft: 20 }}>
      {exercises.map((e, i) => <li key={i} style={{ color: "#d1d5db", fontSize: 14.5, marginBottom: 8 }}>{e}</li>)}
    </ul>
  </div>
);

function App() {
  const [activeTab, setActiveTab] = useState("diet");
  const tabs = [
    { id: "diet", label: "🥗 Diet Plan" },
    { id: "workout", label: "💪 Workout" },
    { id: "lifestyle", label: "🌙 Lifestyle" },
    { id: "mindset", label: "🧠 Mindset" },
  ];

  return (
    <div style={{ minHeight: "100vh" }}>
      {/* Hero */}
      <div style={{ background: `linear-gradient(135deg, #0a0a0a 0%, #170a00 50%, #0a0a0a 100%)`, borderBottom: `1px solid var(--border-color)`, padding: "64px 24px 48px", textAlign: "center", position: "relative", overflow: "hidden" }}>
        <div className="hero-glow" />
        <div style={{ position: "relative", zIndex: 1 }}>
          <div className="fade-in-up" style={{ display: "inline-block", background: "rgba(249, 115, 22, 0.1)", color: accent, borderRadius: 99, padding: "8px 20px", fontSize: 12, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", marginBottom: 20, border: `1px solid rgba(249, 115, 22, 0.3)` }}>
            🔬 Science-Based Personalized Plan
          </div>
          <h1 className="bebas fade-in-up delay-1" style={{ fontSize: "clamp(48px, 10vw, 80px)", color: "#fff", margin: "0 0 12px", lineHeight: 1 }}>
            LOKESH'S <span className="glow-text" style={{ color: accent }}>FAT LOSS</span> PLAN
          </h1>
          <p className="fade-in-up delay-2" style={{ color: "var(--text-muted)", fontSize: 16, margin: "0 0 32px", fontWeight: 500 }}>
            21 yrs • 82kg • 5'8" • Gym Beginner-Intermediate • South Indian Diet
          </p>
          <div className="fade-in-up delay-3" style={{ display: "flex", justifyContent: "center", gap: 16, flexWrap: "wrap", maxWidth: 800, margin: "0 auto" }}>
            {[
              { label: "Maintenance", val: "2,650 kcal", color: blue },
              { label: "Fat Loss Target", val: "2,150 kcal", color: accent },
              { label: "Deficit", val: "~500 kcal/day", color: green },
              { label: "Weekly Loss Goal", val: "0.5–0.75 kg", color: purple },
            ].map((s, i) => (
              <div key={i} className="interactive-card" style={{ padding: "16px 24px", textAlign: "center", flex: "1 1 160px" }}>
                <div className="bebas" style={{ color: s.color, fontSize: 26 }}>{s.val}</div>
                <div style={{ color: "var(--text-dim)", fontSize: 11, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600, marginTop: 4 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="glass-nav">
        <div style={{ display: "flex", maxWidth: 900, margin: "0 auto", overflowX: "auto", padding: "0 16px" }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`tab-button ${activeTab === t.id ? 'active' : ''}`}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "40px 20px" }}>
        
        {/* ===== DIET TAB ===== */}
        {activeTab === "diet" && <div className="fade-in-up">
          <Section title="CALORIE & MACRO SCIENCE" icon="🔬" color={blue}>
            <p style={{ marginTop: 0, fontSize: 15.5 }}>
              Using the <strong style={{ color: "#fff" }}>Mifflin-St Jeor equation</strong> for your stats:<br /><br />
              BMR = (10 × 82) + (6.25 × 172.7) − (5 × 21) + 5 = <strong style={{ color: blue }}>~1,887 kcal</strong><br />
              With moderate gym activity (1.4 TDEE multiplier): Maintenance = <strong style={{ color: blue }}>~2,650 kcal</strong><br />
              Fat loss target (500 kcal deficit) = <strong style={{ color: accent }}>2,150 kcal/day</strong>
            </p>
            <div style={{ background: "rgba(234, 179, 8, 0.05)", borderRadius: 12, padding: "16px 20px", margin: "24px 0", borderLeft: `3px solid ${yellow}`, color: "#d1d5db" }}>
              ⚠️ Never go below 1,800 kcal as a beginner — muscle loss risk skyrockets. The goal is fat loss, not starvation.
            </div>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
              <Macro label="Protein (High - Muscle Preservation)" value="160" unit="g" color={green} pct={30} />
              <Macro label="Carbs (Energy + Performance)" value="215" unit="g" color={blue} pct={40} />
              <Macro label="Fats (Hormones + Satiety)" value="55" unit="g" color={yellow} pct={23} />
            </div>
            <p style={{ marginBottom: 0, marginTop: 24, color: "var(--text-muted)", fontSize: 14 }}>
              📌 At 21, testosterone is high — this is your <strong style={{ color: "#fff" }}>golden window</strong> for body recomposition. You CAN lose fat and build muscle simultaneously as a beginner if you eat right and train hard.
            </p>
          </Section>

          <Section title="FULL DAILY MEAL PLAN" icon="🍽️" color={accent} delay="delay-1">
            <MealCard time="7:00 – 7:30 AM" name="Breakfast" icon="🌅" calories={450} protein={35} foods={["4 whole eggs scrambled / omelette cooked in ½ tsp ghee", "2 medium idlis OR 1 chapati", "1 cup low-fat curd (200g)", "1 small banana"]} note="Eggs are your best friend — cheap, complete protein." />
            <MealCard time="10:30 AM" name="Mid-Morning Snack" icon="🥤" calories={200} protein={20} color={blue} foods={["1 scoop whey protein OR 1 cup boiled chana", "1 seasonal fruit"]} note="Prevents muscle breakdown between breakfast and lunch." />
            <MealCard time="1:00 – 1:30 PM" name="Lunch" icon="🍛" calories={600} protein={45} color={green} foods={["150g cooked chicken OR 200g paneer", "1.5 cups cooked rice", "2 cups mixed sabzi with minimal oil", "1 bowl sambar", "Salad unlimited"]} note="Stick to 1.5 cups cooked rice maximum." />
            <MealCard time="4:00 PM" name="Pre-Workout" icon="⚡" calories={300} protein={20} color={yellow} foods={["1 cup oats + 1 banana", "1 black coffee (NO sugar)"]} note="This is your fuel tank. Carbs here power your workout." />
            <MealCard time="6:30–7:00 PM" name="Post-Workout" icon="💪" calories={380} protein={40} color={purple} foods={["Whey protein shake (30g) in 250ml milk OR 5 eggs", "½ banana"]} note="Muscle protein synthesis peaks here." />
            <MealCard time="9:00 – 9:30 PM" name="Dinner" icon="🌙" calories={420} protein={35} color={blue} foods={["100–120g chicken OR fish OR 3 eggs", "2 chapatis", "Large bowl cooked vegetables", "1 cup curd"]} note="Keep dinner lighter on carbs." />
          </Section>
        </div>}

        {/* ===== WORKOUT TAB ===== */}
        {activeTab === "workout" && <div className="fade-in-up">
          <Section title="6-DAY WEEKLY WORKOUT SPLIT" icon="📅" color={green}>
            <WorkoutDay day="Monday — Push" type="Weights" color={accent} exercises={["Barbell Bench Press — 4 sets × 8–10 reps", "Incline Dumbbell Press — 3 sets × 10–12 reps", "Overhead Press (DB or BB) — 4 sets × 8–10 reps", "Lateral Raises — 3 sets × 12–15 reps", "Tricep Pushdown — 3 sets × 12 reps"]} />
            <WorkoutDay day="Tuesday — Pull" type="Weights" color={blue} exercises={["Deadlifts — 4 sets × 5–6 reps", "Bent-Over Barbell Row — 4 sets × 8–10 reps", "Lat Pulldown — 4 sets × 10–12 reps", "Seated Cable Row — 3 sets × 12 reps", "Barbell Curl — 3 sets × 12 reps"]} />
            <WorkoutDay day="Wednesday — Legs" type="Weights" color={green} exercises={["Barbell Squat — 4 sets × 6–8 reps", "Romanian Deadlift — 3 sets × 10 reps", "Leg Press — 3 sets × 12 reps", "Calf Raises — 4 sets × 20 reps"]} />
            <WorkoutDay day="Thursday — Active Recovery" type="Cardio + Core" color={yellow} exercises={["20 min brisk walk", "Plank — 3 × 60 sec", "Hanging Leg Raises — 3 × 12 reps", "Russian Twists — 3 × 20 reps"]} />
            <WorkoutDay day="Friday — Push 2" type="Weights" color={purple} exercises={["Dumbbell Bench Press — 4 sets × 10 reps", "Cable Chest Flyes — 3 sets × 12 reps", "Seated DB Shoulder Press — 4 sets × 10 reps", "Skull Crushers — 3 sets × 10 reps"]} />
            <WorkoutDay day="Saturday — Pull 2" type="Weights + Cardio" color={blue} exercises={["Pull-Ups — 4 sets × max reps", "Single Arm DB Row — 3 sets × 12 reps", "Incline DB Curl — 3 sets × 10 reps", "HIIT Finisher: 10 rounds — 30 sec sprint"]} />
            <WorkoutDay day="Sunday — Rest" type="Rest" color={"#6b7280"} exercises={["No gym — muscles grow during REST", "Meal prep for the week"]} />
          </Section>
        </div>}

        {/* ===== LIFESTYLE TAB ===== */}
        {activeTab === "lifestyle" && <div className="fade-in-up">
          <Section title="WATER & SLEEP" icon="💧" color={blue}>
             <div className="interactive-card" style={{ padding: "32px 20px", marginBottom: 24, textAlign: "center" }}>
              <div className="bebas" style={{ color: blue, fontSize: 64, letterSpacing: 2, lineHeight: 1, marginBottom: 8 }}>3.5–4L & 7-9 HRS</div>
              <div style={{ color: "var(--text-muted)", fontSize: 14, fontWeight: 500, letterSpacing: 1, textTransform: "uppercase" }}>Daily Targets</div>
            </div>
            <ul style={{ paddingLeft: 20, color: "#d1d5db", fontSize: 14.5 }}>
                <li style={{marginBottom: 8}}>Sip water all day, especially during workouts (500ml).</li>
                <li style={{marginBottom: 8}}>Sleep by 11 PM to maximize growth hormone.</li>
                <li style={{marginBottom: 8}}>No screen 45 min before bed.</li>
            </ul>
          </Section>
        </div>}

        {/* ===== MINDSET TAB ===== */}
        {activeTab === "mindset" && <div className="fade-in-up">
           <Section title="LOKESH'S DAILY SUCCESS CHECKLIST" icon="✅" color={green}>
            <div style={{ display: "grid", gap: 12 }}>
              {[
                { item: "Hit 2,150 kcal target (±100 kcal)", color: green },
                { item: "Hit 160g protein", color: green },
                { item: "Drink 3.5L water", color: blue },
                { item: "Complete planned workout or active recovery", color: accent },
                { item: "Sleep 7+ hours", color: purple },
                { item: "10,000+ steps", color: yellow },
              ].map((c, i) => (
                <div key={i} className="interactive-card" style={{ display: "flex", alignItems: "center", gap: 16, padding: "16px 20px" }}>
                  <div style={{ width: 24, height: 24, borderRadius: 6, border: `2px solid ${c.color}`, flexShrink: 0 }} />
                  <span style={{ color: "#d1d5db", fontSize: 15, fontWeight: 500 }}>{c.item}</span>
                </div>
              ))}
            </div>
          </Section>
        </div>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
